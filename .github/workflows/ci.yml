name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    name: Check, Build & E2E (fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check (lint & format)
        run: bun run check

      - name: Deploy to Convex preview
        id: convex-preview
        run: |
          cd packages/backend
          DEPLOY_OUTPUT=$(npx convex deploy --preview-create "e2e-${{ github.run_id }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          CLEAN_OUTPUT=$(echo "$DEPLOY_OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          PREVIEW_URL=$(echo "$CLEAN_OUTPUT" | grep -oE 'https://[^ ]+\.convex\.cloud' | head -1)
          PREVIEW_SITE_URL=$(echo "$PREVIEW_URL" | sed 's/\.convex\.cloud/.convex.site/')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "preview_site_url=$PREVIEW_SITE_URL" >> "$GITHUB_OUTPUT"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}

      - name: Set preview env vars
        run: |
          cd packages/backend
          npx convex env set USE_STUB_EXTRACTORS true --preview-name "e2e-${{ github.run_id }}"
          npx convex env set OPENAI_API_KEY "$OPENAI_API_KEY" --preview-name "e2e-${{ github.run_id }}"
          npx convex env set QDRANT_URL "$QDRANT_URL" --preview-name "e2e-${{ github.run_id }}"
          npx convex env set QDRANT_API_KEY "$QDRANT_API_KEY" --preview-name "e2e-${{ github.run_id }}"
          npx convex env set BETTER_AUTH_SECRET "$BETTER_AUTH_SECRET" --preview-name "e2e-${{ github.run_id }}"
          npx convex env set SITE_URL http://localhost:3001 --preview-name "e2e-${{ github.run_id }}"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ vars.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

      - name: Build
        run: bun turbo run build
        env:
          VITE_CONVEX_URL: ${{ steps.convex-preview.outputs.preview_url }}
          VITE_CONVEX_SITE_URL: ${{ steps.convex-preview.outputs.preview_site_url }}

      - name: Install Playwright browsers
        run: cd apps/e2e && npx playwright install chromium --with-deps

      - name: Run E2E tests (fast)
        working-directory: apps/e2e
        run: |
          cd ../web && PORT=3001 node .output/server/index.mjs &
          npx wait-on http://localhost:3001 --timeout 30000
          npx playwright test --project=setup --project=seeded --project=chromium
        env:
          VITE_CONVEX_URL: ${{ steps.convex-preview.outputs.preview_url }}
          VITE_CONVEX_SITE_URL: ${{ steps.convex-preview.outputs.preview_site_url }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30

  e2e-slow:
    name: E2E Slow (integration)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Convex preview
        id: convex-preview
        run: |
          cd packages/backend
          DEPLOY_OUTPUT=$(npx convex deploy --preview-create "e2e-slow-${{ github.run_id }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          CLEAN_OUTPUT=$(echo "$DEPLOY_OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          PREVIEW_URL=$(echo "$CLEAN_OUTPUT" | grep -oE 'https://[^ ]+\.convex\.cloud' | head -1)
          PREVIEW_SITE_URL=$(echo "$PREVIEW_URL" | sed 's/\.convex\.cloud/.convex.site/')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "preview_site_url=$PREVIEW_SITE_URL" >> "$GITHUB_OUTPUT"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}

      - name: Set preview env vars (real extractors)
        run: |
          cd packages/backend
          npx convex env set OPENAI_API_KEY "$OPENAI_API_KEY" --preview-name "e2e-slow-${{ github.run_id }}"
          npx convex env set QDRANT_URL "$QDRANT_URL" --preview-name "e2e-slow-${{ github.run_id }}"
          npx convex env set QDRANT_API_KEY "$QDRANT_API_KEY" --preview-name "e2e-slow-${{ github.run_id }}"
          npx convex env set BETTER_AUTH_SECRET "$BETTER_AUTH_SECRET" --preview-name "e2e-slow-${{ github.run_id }}"
          npx convex env set DATALAB_API_KEY "$DATALAB_API_KEY" --preview-name "e2e-slow-${{ github.run_id }}"
          npx convex env set SITE_URL http://localhost:3001 --preview-name "e2e-slow-${{ github.run_id }}"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ vars.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATALAB_API_KEY: ${{ secrets.DATALAB_API_KEY }}

      - name: Build
        run: bun turbo run build
        env:
          VITE_CONVEX_URL: ${{ steps.convex-preview.outputs.preview_url }}
          VITE_CONVEX_SITE_URL: ${{ steps.convex-preview.outputs.preview_site_url }}

      - name: Install Playwright browsers
        run: cd apps/e2e && npx playwright install chromium --with-deps

      - name: Run E2E tests (slow)
        run: |
          cd apps/web && PORT=3001 node .output/server/index.mjs &
          cd apps/e2e && npx wait-on http://localhost:3001 --timeout 30000
          cd apps/e2e && npx playwright test --project=slow
        env:
          VITE_CONVEX_URL: ${{ steps.convex-preview.outputs.preview_url }}
          VITE_CONVEX_SITE_URL: ${{ steps.convex-preview.outputs.preview_site_url }}

      - name: Upload slow test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-slow
          path: apps/e2e/playwright-report/
          retention-days: 30
